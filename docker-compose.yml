version: '3.9'
services:
  backend:
    build: ./backend
    container_name: ims-backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
      - rabbitmq
    ports:
      - "8000:8000"
    networks:
      - ims-net

  frontend:
    build: ./frontend
    container_name: ims-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - ims-net

  db:
    image: postgres:15
    container_name: ims-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ims-db-data:/var/lib/postgresql/data
    networks:
      - ims-net

  redis:
    image: redis:7
    container_name: ims-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ims-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ims-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - ims-net

volumes:
  ims-db-data:

networks:
  ims-net:
    driver: bridge
